<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamesuno2 - Engine</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="manifest" href="./manifest.json" crossorigin="use-credentials">
    <meta name="theme-color" content="#aedefc">
    <meta name="msapplication-TileColor" content="#007e42">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Compra">
    <link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png">

    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #33c4fe; 
            position: fixed; 
        }
        canvas { 
            display: block; 
            width: 100vw !important; 
            height: 100vh !important; 
            object-fit: fill; 
        }
        #rotateNotice { 
            position: fixed; 
            top:0; left:0; 
            width:100%; height:100%; 
            background: #e3f2fd; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            font-size: 2em; 
            color: #333; 
            z-index: 9999; 
            display: none; 
        }
    </style>
</head>
<body>
    <div id="rotateNotice">⚠️ Gira tu dispositivo a <strong>horizontal</strong> para jugar</div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <script src="scenesConfig.js"></script>

    <script>

    // 1. ESCENA DE MENÚ (Añadida aquí al principio)
    class MainMenu extends Phaser.Scene {
        constructor() { super('MainMenu'); }

        create() {
            const { width, height } = this.sys.game.config;

            // 1. Fondo azul chulo (puedes usar un degradado)
            this.add.graphics()
                .fillGradientStyle(0x33c4fe, 0x33c4fe, 0x1a85b5, 0x1a85b5, 1)
                .fillRect(0, 0, width, height);

            this.add.text(width / 2, 60, 'SELECCIONA TU AVENTURA', { 
                fontSize: '40px', fontWeight: 'bold', fill: '#fff', 
                stroke: '#000', strokeThickness: 6 
            }).setOrigin(0.5);

            // 2. Creamos un contenedor para todas las tarjetas
            this.cardContainer = this.add.container(0, 0);

            // 3. Generar tarjetas automáticamente desde SCENES_DATA
            const levelKeys = Object.keys(SCENES_DATA);
            const cardWidth = 350;
            const cardSpacing = 50;
            const startX = width / 2;

            levelKeys.forEach((key, index) => {
                const levelData = SCENES_DATA[key];
                const xPos = startX + (index * (cardWidth + cardSpacing));
                
                const card = this.createLevelCard(xPos, height / 2, key, levelData);
                this.cardContainer.add(card);
            });

            // 4. Lógica de Scroll Horizontal
            this.input.on('pointermove', (p) => {
                if (p.isDown) {
                    this.cardContainer.x += (p.x - p.prevPosition.x);
                    
                    // Límites para que no se pierdan las tarjetas en el infinito
                    const minX = -(levelKeys.length - 1) * (cardWidth + cardSpacing);
                    this.cardContainer.x = Phaser.Math.Clamp(this.cardContainer.x, minX - 100, 200);
                }
            });
        }

            createLevelCard(x, y, key, data) {
                const container = this.add.container(x, y);
                const w = 350;
                const h = 450;

                // Fondo de la tarjeta
                const bg = this.add.graphics();
                bg.fillStyle(0xffffff, 1);
                bg.fillRoundedRect(-w/2, -h/2, w, h, 20);
                bg.lineStyle(6, 0x000000, 0.2);
                bg.strokeRoundedRect(-w/2, -h/2, w, h, 20);

                // Imagen de preview
                let preview;

                // Key único para la textura de la tarjeta (puede ser el mismo que levelImage)
                const imgKey = 'levelPreview_' + key;

                const showPreview = () => {
                    if (this.textures.exists(imgKey)) {
                        preview = this.add.image(0, -50, imgKey).setOrigin(0.5);
                        // Escalar para que quepa en la tarjeta
                        const scaleX = (w - 40) / preview.width;
                        const scaleY = 250 / preview.height;
                        preview.setScale(Math.min(scaleX, scaleY));
                        container.add(preview);
                    } else {
                        // Si falla, fondo gris con emoji
                        preview = this.add.rectangle(0, -50, w - 40, 250, 0xeeeeee).setOrigin(0.5);
                        const emoji = this.add.text(0, -50, data.dir === 'granja' ? '🚜' : '🐒', { fontSize: '100px' }).setOrigin(0.5);
                        container.add(preview);
                        container.add(emoji);
                    }
                };

                if (!this.textures.exists(imgKey)) {
                    // Cargar la imagen si no está en cache
                    this.load.image(imgKey, data.levelImage);
                    this.load.once('complete', () => {
                        showPreview();
                    });
                    this.load.start();
                } else {
                    showPreview();
                }

                // Título del nivel
                const title = this.add.text(0, 120, data.title || key.toUpperCase(), { 
                    fontSize: '28px', fill: '#333', fontWeight: 'bold' 
                }).setOrigin(0.5);

                // Botón Jugar
                const btn = this.add.rectangle(0, 180, 200, 60, 0x4caf50).setInteractive({ useHandCursor: true });
                const btnText = this.add.text(0, 180, '¡JUGAR!', { fontSize: '24px', fill: '#fff' }).setOrigin(0.5);

                btn.on('pointerdown', () => {
                    this.scene.start('MasterEngine', { level: key });
                });
                btn.on('pointerover', () => btn.setFillStyle(0x66bb6a));
                btn.on('pointerout', () => btn.setFillStyle(0x4caf50));

                container.add([bg, title, btn, btnText]);
                return container;
            }
        }
    class MasterEngine extends Phaser.Scene {
        constructor() { super('MasterEngine'); }

        init(data) {
            // --- LIMPIEZA TOTAL DEL CACHE ---
            // Esto elimina todas las imágenes y audios cargados previamente
            // para que no se mezclen entre niveles (pájaro vs loro, etc.)
            this.textures.removeKey('ground');
            this.textures.removeKey('sun');
            this.textures.removeKey('cloud');
            this.textures.removeKey('bird');
            this.textures.removeKey('hoja');
            this.textures.removeKey('m1');
            this.textures.removeKey('m2');
            this.textures.removeKey('m3');

            // También limpiamos los animales y decoraciones dinámicamente
            if (this.cfg) {
                this.cfg.animals.forEach(ani => {
                    this.textures.removeKey(ani.key);
                    this.cache.audio.remove(ani.key + '_sound');
                });
                this.cfg.assets.decorations.forEach(dec => {
                    this.textures.removeKey(dec.key);
                    this.cache.audio.remove(dec.key + '_engine_sound');
                });
                if (this.cfg.jumpSounds) {
                    this.cfg.jumpSounds.forEach(key => {
                        this.cache.audio.remove(key);
                    });
                }
                // --- LIMPIAR MÚSICA DE FONDO ---
                if (this.backgroundMusic) {
                    this.backgroundMusic.stop();
                    this.backgroundMusic.destroy();
                    this.backgroundMusic = null;
                }
                this.cache.audio.remove('background_music');
                // --- LIMPIAR IMÁGENES DE TARJETAS DE NIVELES ---
                Object.keys(SCENES_DATA).forEach(levelKey => {
                    const previewKey = 'levelPreview_' + levelKey;
                    if (this.textures.exists(previewKey)) {
                        this.textures.removeKey(previewKey);
                    }
                });
            }

            // --- CONFIGURACIÓN DEL NIVEL ---
            const levelKey = data.level || 'granja'; 
            this.cfg = SCENES_DATA[levelKey]; 

            this.groundY = 0;
            this.dir = this.cfg.dir;
            this.edgeThreshold = 25;
            this.scrollSpeed = this.cfg.scrollSpeed || 10;
        }

        preload() {
            // Carga de imágenes de sistema
            this.cfg.assets.images.forEach(img => this.load.image(img.key, img.path));
            
            // Carga de decoraciones y sus rutas
            this.cfg.assets.decorations.forEach(dec => this.load.image(dec.key, dec.path));

            // Carga de animales e imágenes/sonidos
            this.cfg.animals.forEach(ani => {
                this.load.image(ani.key, ani.path);
                this.load.audio(ani.key + '_sound', `sounds/${this.dir}/${ani.key}.mp3`);
            });

            // Carga de audio general (música y sonidos de motor específicos)
            this.cfg.assets.audio.forEach(aud => this.load.audio(aud.key, aud.path));
            
        }

        create() {
            
            this.input.addPointer(4);
            const worldWidth = this.cfg.worldWidth;
            const worldHeight = this.sys.game.config.height;
            this.groundY = worldHeight * 0.95;

            this.physics.world.setBounds(0, 0, worldWidth, this.groundY + 15);
            this.cameras.main.setBounds(0, 0, worldWidth, worldHeight);

            this.bgMusic = this.sound.add('background_music', { volume: 0.7, loop: true });
            this.bgMusic.play();

            // Fondo
            this.add.graphics()
                .fillGradientStyle(this.cfg.skyGradient.top, this.cfg.skyGradient.top, this.cfg.skyGradient.bottom, this.cfg.skyGradient.bottom, 1)
                .fillRect(0, 0, worldWidth, worldHeight).setScrollFactor(0);

            this.createEnvironment(worldWidth);
            this.createSkyObjects(worldWidth); // <--- NUEVA FUNCIÓN LLAMADA AQUÍ
            this.createSystems();
            this.createObjects();
            this.setupInteractions();

            // --- BOTÓN HOME ---
            const homeBtn = this.add.text(40, 40, '🏠', { 
                fontSize: '20px', 
                backgroundColor: '#ffffffaa', 
                padding: 10,
                borderRadius: '10px'
            })
            .setInteractive({ useHandCursor: true })
            .setScrollFactor(0) // <--- ESTO ES LO MÁS IMPORTANTE (lo fija a la pantalla)
            .setDepth(2000);    // Siempre por encima de todo

            homeBtn.on('pointerdown', () => {
                // Detenemos la música si está sonando para que no se solape al volver a entrar
                if (this.bgMusic) this.bgMusic.stop();
                
                // Volvemos a la escena del menú
                this.scene.start('MainMenu');
            });

            // Efecto visual al pasar el ratón
            homeBtn.on('pointerover', () => homeBtn.setScale(1.1));
            homeBtn.on('pointerout', () => homeBtn.setScale(1));
        }

        createSkyObjects(worldWidth) {
            const sky = this.cfg.skyObjects;
            if (!sky) return;

            // NUBES DINÁMICAS
            if (sky.clouds) {
                for (let i = 0; i < sky.clouds.count; i++) {
                    let x = Phaser.Math.Between(0, worldWidth);
                    let y = Phaser.Math.Between(50, 180);
                    let cloud = this.add.image(x, y, sky.clouds.key).setScale(Phaser.Math.FloatBetween(0.3, 0.8))
                    .setDepth(this.cfg.assets.images.find(i => i.key === sky.clouds.key)?.depth || 3);
                    this.tweens.add({
                        targets: cloud,
                        x: x + Phaser.Math.Between(40, 90),
                        duration: sky.clouds.speed || 5000,
                        yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
                    });
                }
            }

            // PÁJAROS DINÁMICOS
            // Accedemos a la configuración de los objetos del cielo
            const skyConfig = this.cfg.skyObjects; 

            if (skyConfig && skyConfig.birds) {
                this.birdsGroup = this.physics.add.group({ 
                    allowGravity: false, 
                    collideWorldBounds: true, 
                    bounceX: 1, 
                    bounceY: 1 
                });

                // Buscamos la info del asset una sola vez para ahorrar recursos
                const birdAsset = this.cfg.assets.images.find(i => i.key === skyConfig.birds.key) || {};
                const finalScale = birdAsset.scale || skyConfig.birds.scale || 0.4;
                const finalDepth = birdAsset.depth || 5;

                for (let i = 0; i < skyConfig.birds.count; i++) {
                    let bird = this.birdsGroup.create(
                        Phaser.Math.Between(100, worldWidth - 100), 
                        Phaser.Math.Between(50, 250), 
                        skyConfig.birds.key
                    );

                    // Ahora aplicamos la escala que viene del asset (4.05)
                    bird.setScale(finalScale);
                    bird.setDepth(finalDepth);

                    // Velocidad inicial y flip según dirección
                    let vx = Phaser.Math.Between(80, 160) * (Math.random() > 0.5 ? 1 : -1);
                    bird.setVelocity(vx, Phaser.Math.Between(-20, 20));
                    
                    // Si vuela hacia la izquierda, giramos la imagen
                    if (vx < 0) bird.setFlipX(true);

                    // Aleteo visual
                    this.tweens.add({ 
                        targets: bird, 
                        y: '+=10', 
                        duration: 600, 
                        yoyo: true, 
                        repeat: -1, 
                        ease: 'Sine.easeInOut' 
                    });
                }
            }
        }

        createEnvironment(worldWidth) {
            // Función mejorada para obtener todos los datos de un asset por su clave
            const getAsset = (key) => this.cfg.assets.images.find(i => i.key === key) || {};

            // --- MONTAÑA 3 (FONDO MÁS LEJANO) ---
            const m3 = getAsset('m3');
            this.add.tileSprite(0, this.groundY, worldWidth, m3.height || 370, 'm3')
                .setOrigin(0, 1.14)
                .setScrollFactor(0.05)
                .setDepth(m3.depth || 1)
                .setTileScale(m3.scale || 1);

            // --- MONTAÑA 1 (MEDIO FONDO) ---
            const m1 = getAsset('m1');
            this.add.tileSprite(0, this.groundY, worldWidth, m1.height || 370, 'm1')
                .setOrigin(0, 1.14)
                .setScrollFactor(0.10)
                .setDepth(m1.depth || 2)
                .setTileScale(m1.scale || 1);

            // --- MONTAÑA 2 (MÁS CERCANA) ---
            const m2 = getAsset('m2');
            this.add.tileSprite(0, this.groundY, worldWidth, m2.height || 371, 'm2')
                .setOrigin(0, 1.14)
                .setScrollFactor(0.20)
                .setDepth(m2.depth || 3)
                .setTileScale(m2.scale || 1);

            // --- SUELO (GROUND) ---
            const ground = getAsset('ground');
            this.add.tileSprite(0, this.groundY, worldWidth, ground.height || 120, 'ground')
                .setOrigin(0, 0.70)
                .setScrollFactor(1)
                .setDepth(ground.depth || 4)
                .setTileScale(ground.scale || 0.5);

            // --- SOL (IMAGEN NORMAL) ---
            const sun = getAsset('sun');
            this.add.image(this.sys.game.config.width * 0.5, 280, 'sun')
                .setScale(sun.scale || 0.3)
                .setScrollFactor(0.1)
                .setDepth(sun.depth || 1);
        }

        createSystems() {
            // Smoke texture
            const circle = this.make.graphics({ x: 0, y: 0, add: false }).fillStyle(0xffffff, 1).fillCircle(10, 10, 10);
            circle.generateTexture('white_smoke', 20, 20);
            
            this.exhaust = this.add.particles(0, 0, 'white_smoke', {
                scale: { start: 0.6, end: 0 }, alpha: { start: 0.6, end: 0 }, lifespan: 1200, speed: { min: 30, max: 70 },
                angle: { min: 200, max: 340 }, gravityY: -80, frequency: 15, quantity: 5, emitting: false
            }).setDepth(10);

            this.leafEmitter = this.add.particles(0, 0, undefined, {
                scale: { start: 0.6, end: 0.3 }, alpha: { start: 1, end: 0 }, lifespan: 2000, speed: { min: 50, max: 100 },
                gravityY: 150, rotate: { min: 0, max: 360 }, emitting: false
            }).setDepth(11);

            this.stars = this.add.particles(0, 0, 'star', { scale: { start: 0.05, end: 0 }, lifespan: 600, blendMode: 'ADD', emitting: false });

            this.ground = this.add.rectangle(this.cfg.worldWidth/2, this.groundY + 40, this.cfg.worldWidth, 80, 0x000, 0);
            this.physics.add.existing(this.ground, true);
        }

        createObjects() {
            const placedPositions = []; // Array para guardar las X ocupadas
            const minDistance = 80;    // Distancia mínima en píxeles entre objetos

            this.cfg.assets.decorations.forEach(dec => {
                for (let i = 0; i < dec.count; i++) {
                    let x;
                    let attempts = 0;
                    let foundSpace = false;

                    // Intentamos encontrar una posición libre (máximo 50 intentos para no bloquear el juego)
                    while (attempts < 50 && !foundSpace) {
                        x = Phaser.Math.Between(200, this.cfg.worldWidth - 200);
                        
                        // Comprobamos si está lejos de todos los objetos ya colocados
                        const tooClose = placedPositions.some(pos => Math.abs(pos - x) < minDistance);
                        
                        if (!tooClose) {
                            foundSpace = true;
                            placedPositions.push(x); // Guardamos la posición
                        }
                        attempts++;
                    }

                    // Si después de los intentos no hay sitio, usamos la última X generada igualmente
                    let item = this.add.image(x, this.groundY + dec.offsetY, dec.key)
                        .setOrigin(0.5, 1)
                        .setScale(dec.scale)
                        .setDepth(dec.depth || 10);
                    
                    // Guardamos el depth original en el objeto para recuperarlo después del drag
                    item.originalDepth = dec.depth || 10;

                    if (dec.type === 'tree') {
                        item.setInteractive().on('pointerdown', () => {

                            this.sound.play('arbol_sound', { volume: 1.5 });

                            const textureToUse = dec.leafKey || 'hoja';
                            this.leafEmitter.setTexture(textureToUse);

                            // 👇 CONFIG PERSONALIZADA
                            const cfg = dec.leafConfig || {};

                            const count = cfg.count || 30;
                            const offsetX = cfg.offsetX || 60;
                            const offsetY = cfg.offsetY || { min: 80, max: 120 };

                            // 👇 aplicar escala dinámica
                            if (cfg.scale) {
                                this.leafEmitter.setConfig({
                                    scale: cfg.scale || { start: 0.6, end: 0.3 },
                                    speed: cfg.speed || { min: 50, max: 100 },
                                    gravityY: cfg.gravityY || 150,
                                    rotate: cfg.rotate || { min: 0, max: 360 }
                                });
                            }

                            for(let j = 0; j < count; j++) {
                                let randomX = item.x + Phaser.Math.Between(-offsetX, offsetX);
                                let randomY = item.y - Phaser.Math.Between(offsetY.min, offsetY.max);

                                this.leafEmitter.emitParticleAt(randomX, randomY);
                            }

                            this.tweens.add({ 
                                targets: item, 
                                angle: { from: -3, to: 3 }, 
                                scaleX: '*=1.02',
                                duration: 60, 
                                yoyo: true, 
                                repeat: 3 
                            });
                        });
                    }
                    else if (dec.type === 'vehicle') {
                        item.setInteractive({ draggable: true });
                        item.isVehicle = true;
                        item.fixedY = item.y;
                        if (this.cache.audio.exists(dec.key + '_engine_sound')) {
                            item.engineAudio = this.sound.add(dec.key + '_engine_sound', { loop: true, volume: dec.vol || 1.0 });
                        }
                    }
                }
            });

            // Animales
            this.animals = this.physics.add.group({ bounceX: 0.5, bounceY: 0.1 });
            this.cfg.animals.forEach(ani => {
                let a = this.animals.create(Phaser.Math.Between(200, this.cfg.worldWidth - 200), 100, ani.key).setScale(ani.scale).setInteractive({ draggable: true });                a.minY = this.groundY + ani.groundRange[0];
                a.maxY = this.groundY + ani.groundRange[1];
                a.currentTargetY = Phaser.Math.Between(a.minY, a.maxY);
                a.jumpPower = ani.jump;
                a.currentSound = this.sound.add(ani.key + '_sound', { volume: ani.vol });
                
                // CAMBIO 1: Aumentamos el drag para que no patinen eternamente
                a.body.setDragX(0); // <--- Sin fricción inicial para que vuele bien
                a.body.setCollideWorldBounds(true);
                a.body.setBounce(0.5, 0.2); // <--- Le damos un poco de rebote para que parezca una pelota
                
                a.setDepth(ani.depth || 100);
                a.nextDecision = 0;
            });
        }

        setupInteractions() {
            this.input.on('dragstart', (p, obj) => {
                obj.isHeld = true;
                if (obj.body) { obj.body.setAllowGravity(false); obj.body.setVelocity(0,0); }
                if (obj.isVehicle && obj.engineAudio) {
                    obj.engineAudio.play();
                    const originalDepth = this.cfg.assets.decorations.find(d => d.key === obj.texture.key)?.depth || 10;
                    obj.setDepth(originalDepth);
                    this.exhaust.startFollow(obj, -obj.displayWidth * -0.4, -25);
                    this.exhaust.start();
                } else if (obj.currentSound) {
                    obj.currentSound.play();
                }
            });

            this.input.on('drag', (p, obj, dx, dy) => {
                obj.oldPos = { x: obj.x, y: obj.y };
                if (obj.isVehicle) { obj.setPosition(dx, obj.fixedY); }
                else {
                    const limitY = this.groundY - (obj.displayHeight / 2);
                    obj.setPosition(dx, dy > limitY ? limitY : dy);
                }
            });

            this.input.on('dragend', (p, obj) => {
                obj.isHeld = false;
                if (obj.isVehicle) { 
                    if(obj.engineAudio) obj.engineAudio.stop(); 
                    this.exhaust.stop(); 
                    
                    const originalDepth = this.cfg.assets.decorations.find(d => d.key === obj.texture.key)?.depth || 10;
                    obj.setDepth(originalDepth);
                } else if (obj.currentSound) {
                    obj.currentSound.stop();
                }
                if (obj.body) {
                    obj.body.setAllowGravity(true);
                    obj.body.setVelocity((obj.x - obj.oldPos.x) * 20, (obj.y - obj.oldPos.y) * 20);
                }
            });

            this.input.on('pointermove', (p) => {
                if (p.isDown && !p.dragState && !this.input.hitTestPointer(p).length) {
                    this.cameras.main.scrollX -= (p.x - p.prevPosition.x);
                }
            });

            this.physics.add.collider(this.animals, this.ground);
        }

        update(time) {
            this.animals.children.iterate(a => {
                if (!a || a.isHeld) return;

                // ¿ESTÁ EN EL AIRE?
                if (a.y < a.currentTargetY - 10) {
                    // Mientras vuela, no le ponemos freno para que mantenga su dirección
                    a.body.setDragX(0); 
                } 
                // ¿ESTÁ EN EL SUELO?
                else {
                    // Al tocar el suelo, aplicamos un freno fuerte (fricción con el pasto/suelo)
                    a.body.setDragX(2000); 
                    
                    // Si ya casi no se mueve, lo dejamos quieto del todo
                    if (Math.abs(a.body.velocity.x) < 20) {
                        a.body.setVelocityX(0);
                        a.y = a.currentTargetY;
                        a.body.setVelocityY(0);
                    }

                    // Lógica de saltos automáticos (IA del animal)
                    if (time > a.nextDecision && a.body.velocity.x === 0) {
                        let dir = Phaser.Math.Between(-1, 1);
                        if (dir !== 0) {
                            a.currentTargetY = Phaser.Math.Between(a.minY, a.maxY);
                            a.body.setVelocityY(a.jumpPower);
                            a.body.setVelocityX(dir * 150); // Un poco más de impulso al caminar

                            const cam = this.cameras.main;

                            if (cam.worldView.contains(a.x, a.y)) {

                                const sounds = this.cfg.jumpSounds;

                                console.log(sounds.length); 

                                if (sounds && sounds.length > 0) {
                                    
                                    const randomKey = Phaser.Utils.Array.GetRandom(sounds);

                                    if (this.cache.audio.exists(randomKey)) {
                                        this.sound.play(randomKey, { volume: 0.5 });
                                    } else {
                                        console.warn('Sonido no cargado:', randomKey);
                                    }
                                }
                            }
                            a.setFlipX(dir === 1);
                        }
                        a.nextDecision = time + Phaser.Math.Between(2000, 5000);
                    }
                }

                // --- NUEVA LÓGICA DE AUTO-SCROLL AL ARRASTRAR ---
                const pointer = this.input.activePointer;
                
                if (pointer.isDown) {
                    // Buscamos si hay algún animal o vehículo siendo arrastrado
                    const draggedObj = this.children.list.find(child => child.isHeld === true);

                    if (draggedObj) {
                        const cam = this.cameras.main;
                        const viewWidth = cam.width;
                        
                        // Si el puntero está cerca del borde derecho
                        if (pointer.x > viewWidth - this.edgeThreshold) {
                            if (cam.scrollX < this.cfg.worldWidth - viewWidth) {
                                cam.scrollX += this.scrollSpeed;
                                // Ajustamos la posición del objeto para que no se "atrase" respecto al dedo
                                draggedObj.x += this.scrollSpeed;
                            }
                        }
                        // Si el puntero está cerca del borde izquierdo
                        else if (pointer.x < this.edgeThreshold) {
                            if (cam.scrollX > 0) {
                                cam.scrollX -= this.scrollSpeed;
                                draggedObj.x -= this.scrollSpeed;
                            }
                        }
                    }
                }
            });

            // --- NUEVA LÓGICA DE VOLTEO DE PÁJAROS ---
            if (this.birdsGroup) {
                this.birdsGroup.children.iterate(bird => {
                    if (!bird || !bird.body) return;

                    // Si la velocidad X es negativa, va a la IZQUIERDA
                    if (bird.body.velocity.x < 0) {
                        bird.setFlipX(true); // Volteamos la imagen
                    } 
                    // Si la velocidad X es positiva, va a la DERECHA
                    else if (bird.body.velocity.x > 0) {
                        bird.setFlipX(false); // Imagen original
                    }
                    
                    // Pequeño toque extra aleatorio para cambiar altura
                    if (Phaser.Math.Between(0, 1000) < 5) {
                        bird.setVelocityY(Phaser.Math.Between(-20, 20));
                    }
                });
            }
        }
    }

    // 3. CONFIGURACIÓN FINAL (Actualizada)
    const CANONICAL_HEIGHT = 720;
    const config = {
        type: Phaser.AUTO,
        scale: { 
            mode: Phaser.Scale.FIT, 
            autoCenter: Phaser.Scale.CENTER_BOTH, 
            width: Math.ceil(CANONICAL_HEIGHT * (window.innerWidth/window.innerHeight)), 
            height: CANONICAL_HEIGHT 
        },
        physics: { 
            default: 'arcade', 
            arcade: { gravity: { y: 1200 }, debug: false } 
        },
        // El orden importa: la primera escena del array es la que arranca el juego
        scene: [MainMenu, MasterEngine] 
    };

    window.game = new Phaser.Game(config);

    window.addEventListener('resize', () => {
        if (window.game) window.game.scale.setGameSize(Math.ceil(CANONICAL_HEIGHT * (window.innerWidth/window.innerHeight)), CANONICAL_HEIGHT);
    });

    
    </script>
</body>
